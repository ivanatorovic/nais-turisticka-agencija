version: '3'

services:
  # ===== Drugarev Workflow servis =====
  workflow-service:
    build: ./workflow-service
    container_name: workflow-service
    ports:
      - "8081:8081"
    depends_on:
      - workflow-neo4j
    environment:
      SERVER_PORT: 8081
      SPRING_NEO4J_URI: bolt://workflow-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: workflow
    networks:
      - mynetwork

  workflow-neo4j:
    image: neo4j
    container_name: workflow-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/workflow
    volumes:
      - ./workflow-data:/data
    networks:
      - mynetwork

  # ===== Recommendation servis =====
  neo4j:
    image: neo4j
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - ./data:/data
    networks:
      - mynetwork

  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    container_name: recommendation-service
    depends_on:
      - neo4j
    ports:
      - "8080:8080"
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_USERNAME: neo4j
      SPRING_NEO4J_PASSWORD: password
    networks:
      - mynetwork

  # ===== Dodatne aktivnosti =====
  neo4j-nais:
    image: neo4j
    container_name: neo4j-nais
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - nais_data:/data
    networks:
      - mynetwork

  dodatne-aktivnosti-service:
    build:
      context: ./dodatne-aktivnosti
      dockerfile: Dockerfile
    container_name: dodatne-aktivnosti-service
    ports:
      - "8082:8082"
    depends_on:
      - neo4j-nais
    environment:
      SPRING_NEO4J_URI: bolt://neo4j-nais:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
    networks:
      - mynetwork

  # ===== MILVUS - vektorska baza =====
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./zalbe/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mynetwork

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./zalbe/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mynetwork

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./zalbe/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - mynetwork

  attu:
    image: zilliz/attu:v2.4
    container_name: attu
    environment:
      MILVUS_URL: standalone:19530
    ports:
      - "8090:3000"
    depends_on:
      - standalone
    networks:
      - mynetwork

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - mynetwork

  # ===== TVOJ MIKROSERVIS - Servis za žalbe =====
  zalbe-service:
    build:
      context: ./zalbe
      dockerfile: Dockerfile
    image: zalbe-service:latest
    container_name: zalbe-service
    restart: on-failure
    environment:
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      APP_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - standalone
    networks:
      - mynetwork

volumes:
  nais_data:
  ollama_data:

networks:
  mynetwork:
    driver: bridge