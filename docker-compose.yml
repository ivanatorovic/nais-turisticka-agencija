version: '3'

services:
  workflow-service:
    build: ./workflow-service
    container_name: workflow-service
    ports:
      - "8081:8081"
    depends_on:
      - workflow-neo4j
    environment:
      SERVER_PORT: 8081
      SPRING_NEO4J_URI: bolt://workflow-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: workflow
    networks:
      - mynetwork
  workflow-neo4j:
    image: neo4j
    container_name: workflow-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/workflow
    volumes:
      - ./workflow-data:/data
    networks:
      - mynetwork

  neo4j:
    image: neo4j
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - ./data:/data
    networks:
      - mynetwork

  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    container_name: recommendation-service
    depends_on:
      - neo4j
    ports:
      - "8080:8080"
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_USERNAME: neo4j
      SPRING_NEO4J_PASSWORD: password
    networks:
      - mynetwork

  neo4j-nais:
      image: neo4j
      container_name: neo4j-nais
      ports:
        - "7476:7474"
        - "7689:7687"
      environment:
        NEO4J_AUTH: neo4j/password
      volumes:
        - nais_data:/data
      networks:
        - mynetwork

  dodatne-aktivnosti-service:
        build:
          context: ./dodatne-aktivnosti
          dockerfile: Dockerfile
        container_name: dodatne-aktivnosti-service
        ports:
          - "8082:8082"
        depends_on:
          - neo4j-nais
        environment:
          SPRING_NEO4J_URI: bolt://neo4j-nais:7687
          SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
          SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
        networks:
          - mynetwork

volumes:
  nais_data:

networks:
  mynetwork:
    driver: bridge