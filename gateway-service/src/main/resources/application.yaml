server:
  port: 9000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  application:
    name: gateway-api

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: dodatne-aktivnosti
          uri: lb://dodatne-aktivnosti
          predicates:
            - Path=/dodatne-aktivnosti/**
          filters:
            - StripPrefix=1

        - id: analiza-aktivnosti
          uri: lb://analiza-aktivnosti
          predicates:
            - Path=/analiza-aktivnosti/**
          filters:
            - StripPrefix=1

        - id: analiza-prodaje
          uri: lb://analiza-prodaje
          predicates:
            - Path=/analiza-prodaje/**
          filters:
            - StripPrefix=1

        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/recommendation-service/**
          filters:
            - StripPrefix=1

