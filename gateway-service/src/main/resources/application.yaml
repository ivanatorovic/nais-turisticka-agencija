server:
  port: 9000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  application:
    name: gateway-api

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: dodatne-aktivnosti
          uri: lb://dodatne-aktivnosti
          predicates:
            - Path=/dodatne-aktivnosti/**
          filters:
            - StripPrefix=1

